version: 2

builds:
  - binary: opsbudget
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "opsbudget_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: getopsbudget
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: opsbudget
    homepage: https://opsbudget.com
    description: "CLI for Ping by OpsBudget — uptime monitoring"
    license: MIT
    install: |
      bin.install "opsbudget"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
